<!DOCTYPE html>
<html>
<head>

<title>Coco Connections</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#f6f6f6;
}

.grid{
display:grid;
grid-template-columns: repeat(4,120px);
gap:10px;
justify-content:center;

}

.word{

border-radius:8px;

.selected{

}

.group{
margin:10px auto;
width:520px;
padding:10px;
border-radius:8px;
color:white;
font-weight:bold;
}

button{
margin-top:20px;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Coco Connections</h1>

<p id="mistakes">Mistakes remaining: 4</p>

<div id="grid" class="grid"></div>

<button onclick="submitGuess()">Submit</button>

<script src="script.js"></script>

</body>
</html>
